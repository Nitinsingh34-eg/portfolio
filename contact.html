<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Nitin Singh | Futuristic Portfolio</title>

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Google Fonts: Inter and Orbitron (for futuristic headings) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Global CSS Particles (Background) -->
  <div class="bg-dust-particles"></div>

  <!-- Background Particles / Floating Orbs -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navigation -->
  <nav class="glass-nav">
    <div class="logo">NS.</div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="overview.html" class="nav-link">Overview</a></li>
      <li><a href="about.html" class="nav-link">About</a></li>
      <li><a href="academic.html" class="nav-link">Academic</a></li>
      <li><a href="projects.html" class="nav-link">Projects</a></li>
      <li><a href="contact.html" class="nav-link">Contact</a></li>
    </ul>
    <div class="hamburger">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <!-- Contact Section -->
  <section id="contact" class="section"
    style="padding-top: 120px; min-height: calc(100vh - 200px); opacity: 1; transform: translateY(0);">
    <h2 class="section-title">Establish Connection</h2>
    <div class="contact-container glass-card">
      <form class="contact-form">
        <div class="input-group">
          <input type="text" id="name" required placeholder=" ">
          <label for="name">Your Name</label>
        </div>
        <div class="input-group">
          <input type="email" id="email" required placeholder=" ">
          <label for="email">Comm-Link (Email)</label>
        </div>
        <div class="input-group">
          <textarea id="message" required rows="4" placeholder=" "></textarea>
          <label for="message">Transmission Data (Message)</label>
        </div>
        <button type="submit" class="btn btn-primary glow-on-hover">Send Transmission <i
            class="fas fa-paper-plane"></i></button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer style="margin-top: auto;">
    <div class="social-links">
      <a href="https://www.linkedin.com/in/nitin-singh-848a13334/" target="_blank"
        class="social-icon floating-element delay-1"><i class="fab fa-linkedin-in"></i></a>
      <a href="https://github.com/Nitinsingh34-eg" target="_blank" class="social-icon floating-element delay-2"><i
          class="fab fa-github"></i></a>
      <a href="/RESUME.pdf" download="RESUME.pdf" class="social-icon floating-element delay-3" title="Download Resume"><i
          class="fas fa-file-pdf"></i></a>
    </div>
    <p>&copy; 2026 Nitin Singh. Initiating Next Gen Web.</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
